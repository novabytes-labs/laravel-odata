version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    reviewers:
      - Eligioo
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    reviewers:
      - Eligioo
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
